# render.yaml
# Render deployment configuration for Studybo Instagram Intelligence Backend

services:
  - type: web
    name: studybo-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: node server.js

    # No healthCheckPath — Render will just verify the PORT is bound (instant)
    # HTTP health checks caused an infinite restart loop because they fired
    # before the server was ready during the ~1s MongoDB connection window.

    envVars:
      - key: NODE_ENV
        value: production
